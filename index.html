<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Body Flow</title> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Body Flow"> <style>
    :root { 
      /* 3. 테마 색상 변경 (운동/건강에 어울리는 민트&그린) */
      --primary: #2ecc71; /* 메인 그린 */
      --secondary: #1abc9c; /* 민트 테일 */
      --bg: #0d1110; /* 다크 배경 유지 */
    }
    
    body, html { 
      background: var(--bg); 
      margin: 0; padding: 0; 
      width: 100%; height: 100%; 
      overflow: hidden; 
      font-family: -apple-system, sans-serif;
    }

    .full-screen {
      position: absolute; 
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none; 
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      padding: 30px;
    }

    .icon-preview { 
      width: 110px; height: 110px; border-radius: 24px; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
      margin-bottom: 25px; border: 1px solid #212924;
      object-fit: cover; flex-shrink: 0; aspect-ratio: 1/1;
    }

    /* 4. 강조 텍스트 색상 변경 */
    h2 { color: var(--primary); margin-bottom: 15px; font-size: 26px; font-weight: 800; }
    
    .guide-button {
      /* 5. 버튼 그라데이션 변경 */
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: white; padding: 14px 28px; border-radius: 50px;
      font-weight: 700; font-size: 16px; border: none; cursor: pointer;
      box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
    }

    #guide-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 9999; backdrop-filter: blur(8px);
    }
    .instruction { position: absolute; bottom: 100px; width: 100%; text-align: center; padding: 20px; }
    
    /* 6. 화살표 색상 변경 */
    .arrow { font-size: 50px; color: var(--primary); animation: bounce 1s infinite; margin-top: 20px; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(15px); } }

    /* 7. 로딩 텍스트 색상 및 문구 변경 */
    .flowing-text { color: var(--secondary); font-weight: bold; font-size: 1.1em; letter-spacing: 4px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    
    .fallback-msg { color: #444; font-size: 12px; margin-top: 20px; text-decoration: underline; cursor: pointer; }
  </style>

  <script>
    /* ★★★★★ 8. 가장 중요: 본인의 Body Flow GAS URL로 교체하세요 ★★★★★ */
    const APP_URL = "https://script.google.com/macros/s/AKfycbwD_gMZLQSWU1Nn80nmIxMtmcicION07i8unILf0RmUj7aWQ437J4Gf0zUcq2ZQl8sN/exec";

    function init() {
      const isStandalone = window.navigator.standalone === true || 
                           window.matchMedia('(display-mode: standalone)').matches;

      document.getElementById('install-ui').style.display = 'none';
      document.getElementById('loading-ui').style.display = 'none';

      if (isStandalone) {
        // [실행 모드]
        const loadingUI = document.getElementById('loading-ui');
        loadingUI.style.display = 'flex'; 
        
        setTimeout(function() {
          window.location.href = APP_URL;
        }, 300);
      } else {
        // [설치 모드]
        const installUI = document.getElementById('install-ui');
        installUI.style.display = 'flex'; 
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</head>
<body>

  <div id="install-ui" class="full-screen">
    <img src="icon.png" class="icon-preview">
    <h2>Body Flow</h2> <p style="color:#888; margin-bottom: 30px; line-height: 1.6;">
      스마트한 체형 및 건강 관리를 위해<br>아래 버튼을 눌러 앱을 설치하세요.
    </p>
    <button class="guide-button" onclick="document.getElementById('guide-overlay').style.display='block'">앱 설치 가이드</button>
  </div>

  <div id="loading-ui" class="full-screen">
    <img src="icon.png" class="icon-preview" style="width:80px; height:80px; box-shadow:none; opacity:0.5;">
    <div class="flowing-text">BODY FLOWING...</div>
    <div class="fallback-msg" onclick="window.location.href=APP_URL">페이지가 멈췄다면 여기를 터치하세요.</div>
  </div>

  <div id="guide-overlay" onclick="this.style.display='none'">
    <div class="instruction">
      <h3 style="color:var(--primary);">앱 설치 방법</h3>
      <p style="color:#ccc; font-size: 14px;">
        1. 하단 메뉴의 <strong>공유</strong> 버튼을 클릭<br>
        2. <strong>'홈 화면에 추가'</strong>를 선택하세요.
      </p>
      <div class="arrow">↓</div>
    </div>
  </div>

</body>
</html>
